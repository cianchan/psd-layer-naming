<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PSD 图层重命名工具</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen" style="font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif">

  <header class="bg-white border-b border-gray-200 px-6 py-4 mb-6">
    <div class="max-w-2xl mx-auto flex items-center gap-3">
      <div class="w-9 h-9 bg-indigo-600 rounded-xl flex items-center justify-center text-xl">🎨</div>
      <div>
        <h1 class="text-lg font-bold text-gray-900">PSD 图层重命名工具</h1>
        <p class="text-xs text-gray-400">设置路径 → 配置命名 → 一键处理所有 PSD</p>
      </div>
    </div>
  </header>

  <main class="max-w-2xl mx-auto px-4 pb-16 space-y-4">

    <!-- Step 1: Folders -->
    <div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-5">
      <div class="flex items-center gap-2 mb-3">
        <span class="w-6 h-6 rounded-full bg-indigo-100 text-indigo-700 text-xs font-bold flex items-center justify-center">1</span>
        <h2 class="font-semibold text-gray-800">文件夹设置</h2>
      </div>
      <div class="space-y-3">
        <div>
          <label class="block text-sm text-gray-600 mb-1">PSD 输入文件夹</label>
          <div class="flex gap-2">
            <input id="input-folder" type="text"
              class="flex-1 px-3 py-2 text-sm border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-300"
              placeholder="包含原始 PSD 的文件夹" oninput="save()" />
            <button onclick="pickFolder('input-folder','PSD 输入文件夹')"
              class="px-3 py-2 text-sm border border-gray-300 rounded-lg bg-white hover:bg-gray-50 whitespace-nowrap">📁 选择</button>
            <button onclick="previewPSD()"
              class="px-3 py-2 text-sm border border-gray-300 rounded-lg bg-white hover:bg-gray-50 whitespace-nowrap text-gray-600">预览</button>
          </div>
          <div id="psd-list" class="mt-2 hidden">
            <p id="psd-count" class="text-xs text-gray-500 mb-1.5"></p>
            <div id="psd-names" class="flex flex-wrap gap-1"></div>
          </div>
          <p id="psd-error" class="mt-1 text-xs text-red-500 hidden"></p>
        </div>
        <div>
          <label class="block text-sm text-gray-600 mb-1">PSD 输出文件夹</label>
          <div class="flex gap-2">
            <input id="output-folder" type="text"
              class="flex-1 px-3 py-2 text-sm border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-300"
              placeholder="处理后的 PSD 保存位置" oninput="save()" />
            <button onclick="pickFolder('output-folder','PSD 输出文件夹')"
              class="px-3 py-2 text-sm border border-gray-300 rounded-lg bg-white hover:bg-gray-50 whitespace-nowrap">📁 选择</button>
          </div>
        </div>

        <!-- Product category inputs (optional, enables API-assisted refinement) -->
        <div class="pt-1 border-t border-gray-100">
          <label class="block text-sm text-gray-600 mb-2">商品品类 <span class="text-xs text-gray-400 font-normal">（可选；不填时使用本地识别，填写后可结合 Shopee VPN 进一步增强）</span></label>
          <div class="flex gap-3">
            <div class="flex-1">
              <input id="seg-level1" type="text" placeholder="Level1 品类，如 Electronics" oninput="save()"
                class="w-full px-3 py-2 text-sm border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-300" />
            </div>
            <div class="flex-1">
              <input id="seg-level3" type="text" placeholder="Level3 品类，如 Electric Kettles" oninput="save()"
                class="w-full px-3 py-2 text-sm border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-300" />
            </div>
          </div>
        </div>

        <!-- User space token for office proxy -->
        <div class="pt-1 border-t border-gray-100">
          <label class="block text-sm text-gray-600 mb-1">User space token <span class="text-xs text-gray-400 font-normal">（办公网抠图必填，刷新后保留）</span></label>
          <div class="flex gap-2">
            <input id="space-token" type="password" placeholder="Bearer token（从 SPEX Space 页面获取）" oninput="save()"
              class="flex-1 px-3 py-2 text-sm border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-300 font-mono" />
            <button onclick="toggleTokenVis()" id="btn-toggle-token"
              class="px-3 py-2 text-sm border border-gray-300 rounded-lg bg-white hover:bg-gray-50 whitespace-nowrap">👁 显示</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Step 2: Type-based naming -->
    <div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-5">
      <div class="flex items-center gap-2 mb-1">
        <span class="w-6 h-6 rounded-full bg-indigo-100 text-indigo-700 text-xs font-bold flex items-center justify-center">2</span>
        <h2 class="font-semibold text-gray-800">图层命名配置</h2>
      </div>
      <p class="text-xs text-gray-400 mb-4 ml-8">按图层类型自动重命名，无需依赖原始图层名称。文字层自动编号（text1, text2…）。</p>

      <div class="space-y-2">
        <!-- Text row (fixed) -->
        <div class="flex items-center gap-3 px-3 py-2.5 bg-gray-50 rounded-xl">
          <div class="flex items-center gap-2 w-44">
            <span class="text-base">T</span>
            <span class="text-sm font-medium text-gray-700">文字层</span>
          </div>
          <span class="text-gray-400 text-sm">→</span>
          <code class="text-sm text-indigo-600 bg-indigo-50 px-2 py-0.5 rounded">text1, text2, text3…</code>
          <span class="ml-auto text-xs text-gray-400">自动编号，不可修改</span>
        </div>
        <!-- Pixel row -->
        <div class="flex items-center gap-3 px-3 py-2 bg-white border border-gray-200 rounded-xl">
          <div class="flex items-center gap-2 w-44">
            <span class="text-base">🖼</span>
            <span class="text-sm text-gray-700">图片层 / 智能对象</span>
          </div>
          <span class="text-gray-400 text-sm">→</span>
          <input id="name-pixel" type="text" value="scenebg" oninput="save()"
            class="flex-1 px-2 py-1 text-sm border border-gray-300 rounded-lg focus:outline-none focus:ring-1 focus:ring-indigo-300 font-mono" />
        </div>
        <!-- Shape row -->
        <div class="flex items-center gap-3 px-3 py-2 bg-white border border-gray-200 rounded-xl">
          <div class="flex items-center gap-2 w-44">
            <span class="text-base">⬜</span>
            <span class="text-sm text-gray-700">形状层</span>
          </div>
          <span class="text-gray-400 text-sm">→</span>
          <input id="name-shape" type="text" value="stickerbg" oninput="save()"
            class="flex-1 px-2 py-1 text-sm border border-gray-300 rounded-lg focus:outline-none focus:ring-1 focus:ring-indigo-300 font-mono" />
        </div>
      </div>

      <p class="text-xs text-gray-400 mt-3 ml-1">
        💡 同类型多个图层时自动加编号（如 product1, product2）；只有一个时直接用名称（如 product）。
      </p>
    </div>

    <!-- Step 3: Action -->
    <div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-5">
      <div class="flex items-center gap-2 mb-4">
        <span class="w-6 h-6 rounded-full bg-green-100 text-green-700 text-xs font-bold flex items-center justify-center">3</span>
        <h2 class="font-semibold text-gray-800">开始处理</h2>
      </div>

      <div class="flex gap-3">
        <button id="btn-run" onclick="runProcess()"
          class="flex-1 py-4 text-lg font-bold text-white rounded-xl bg-gradient-to-r from-indigo-600 to-violet-600 hover:from-indigo-700 hover:to-violet-700 active:scale-[0.98] transition-all shadow-md shadow-indigo-200">
          🚀 开始处理 PSD
        </button>
        <button id="btn-stop" onclick="stopProcess()" disabled
          class="px-5 py-4 text-sm font-medium text-red-600 border-2 border-red-200 rounded-xl hover:bg-red-50 disabled:opacity-30 disabled:cursor-not-allowed transition-all">
          ⛔ 终止
        </button>
      </div>
      <p class="text-center text-xs text-gray-400 mt-2">自动打开 Photoshop 批量处理所有 PSD，完成后保存至输出文件夹</p>
      <p id="run-error" class="mt-2 text-xs text-red-500 hidden"></p>

      <div id="run-result" class="hidden mt-4 flex items-center gap-3 p-3 rounded-xl">
        <span id="run-result-icon" class="text-2xl"></span>
        <div>
          <p id="run-result-title" class="text-sm font-semibold"></p>
          <p id="run-result-desc" class="text-xs mt-0.5"></p>
        </div>
      </div>
    </div>

    <!-- Log -->
    <div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-5">
      <div class="flex items-center justify-between mb-2">
        <span class="text-sm font-medium text-gray-700">运行日志</span>
        <button onclick="clearLogs()" class="text-xs text-gray-400 hover:text-gray-600">清除</button>
      </div>
      <div id="log-panel"
        class="bg-gray-900 rounded-xl p-3 h-36 overflow-y-auto text-xs text-gray-300 space-y-0.5"
        style="font-family:'SF Mono',Menlo,Consolas,monospace">
        <p class="text-gray-500">— 等待操作 —</p>
      </div>
    </div>

  </main>

  <script>
    const STORE_KEY = "psd_renamer_v1";
    let logPoller = null;

    // ── Persist & Restore ────────────────────────────────────
    function save() {
      const data = {
        inputFolder: document.getElementById("input-folder").value,
        outputFolder:document.getElementById("output-folder").value,
        namePixel:   document.getElementById("name-pixel").value,
        nameShape:   document.getElementById("name-shape").value,
        segLevel1:   document.getElementById("seg-level1").value,
        segLevel3:   document.getElementById("seg-level3").value,
        spaceToken:  document.getElementById("space-token").value,
      };
      localStorage.setItem(STORE_KEY, JSON.stringify(data));
    }

    function restore() {
      try {
        const data = JSON.parse(localStorage.getItem(STORE_KEY) || "{}");
        if (data.inputFolder)  document.getElementById("input-folder").value  = data.inputFolder;
        if (data.outputFolder) document.getElementById("output-folder").value = data.outputFolder;
        if (data.namePixel)    document.getElementById("name-pixel").value    = data.namePixel;
        if (data.nameShape)    document.getElementById("name-shape").value    = data.nameShape;
        if (data.segLevel1)    document.getElementById("seg-level1").value    = data.segLevel1;
        if (data.segLevel3)    document.getElementById("seg-level3").value    = data.segLevel3;
        if (data.spaceToken)   document.getElementById("space-token").value   = data.spaceToken;
      } catch(e) {}
    }

    function toggleTokenVis() {
      const el = document.getElementById("space-token");
      const btn = document.getElementById("btn-toggle-token");
      if (el.type === "password") { el.type = "text"; btn.textContent = "🙈 隐藏"; }
      else { el.type = "password"; btn.textContent = "👁 显示"; }
    }

    // ── Pickers ──────────────────────────────────────────────
    async function pickFolder(inputId, prompt) {
      try {
        const res = await fetch("/api/pick_folder", {
          method:"POST", headers:{"Content-Type":"application/json"},
          body: JSON.stringify({prompt})
        });
        const d = await res.json();
        if (d.path) { document.getElementById(inputId).value = d.path; save(); }
      } catch(e) { appendLog("❌ " + e.message); }
    }

    async function pickFile(inputId) {
      try {
        const res = await fetch("/api/pick_file", {
          method:"POST", headers:{"Content-Type":"application/json"},
          body: JSON.stringify({})
        });
        const d = await res.json();
        if (d.path) { document.getElementById(inputId).value = d.path; save(); }
      } catch(e) { appendLog("❌ " + e.message); }
    }

    // ── Preview PSDs ─────────────────────────────────────────
    async function previewPSD() {
      hideErr("psd-error");
      const folder = document.getElementById("input-folder").value.trim();
      if (!folder) { showErr("psd-error", "请先选择输入文件夹"); return; }
      try {
        const res = await fetch("/api/preview_psd", {
          method:"POST", headers:{"Content-Type":"application/json"},
          body: JSON.stringify({input_folder: folder})
        });
        const d = await res.json();
        if (d.error) { showErr("psd-error", d.error); return; }
        document.getElementById("psd-count").textContent = `找到 ${d.count} 个 PSD 文件`;
        document.getElementById("psd-names").innerHTML = (d.files||[]).map(f =>
          `<span class="px-2 py-0.5 bg-indigo-50 text-indigo-700 text-xs rounded border border-indigo-100">${f}</span>`
        ).join("");
        document.getElementById("psd-list").classList.remove("hidden");
        appendLog(`📁 找到 ${d.count} 个 PSD 文件`);
      } catch(e) { showErr("psd-error", "请求失败: " + e.message); }
    }

    // ── Run ──────────────────────────────────────────────────
    async function runProcess() {
      hideErr("run-error");
      document.getElementById("run-result").classList.add("hidden");

      const inputFolder  = document.getElementById("input-folder").value.trim();
      const outputFolder = document.getElementById("output-folder").value.trim();
      const namePixel    = document.getElementById("name-pixel").value.trim() || "scenebg";
      const nameShape    = document.getElementById("name-shape").value.trim() || "stickerbg";
      const segLevel1    = document.getElementById("seg-level1").value.trim();
      const segLevel3    = document.getElementById("seg-level3").value.trim();
      const spaceToken   = document.getElementById("space-token").value.trim();

      if (!inputFolder)  { showErr("run-error", "请填写 PSD 输入文件夹"); return; }
      if (!outputFolder) { showErr("run-error", "请填写 PSD 输出文件夹"); return; }
      setRunning(true);
      try {
        const res = await fetch("/api/run", {
          method:"POST", headers:{"Content-Type":"application/json"},
          body: JSON.stringify({
            input_folder:  inputFolder,
            output_folder: outputFolder,
            level1_cat:    segLevel1,
            level3_cat:    segLevel3,
            space_token:   spaceToken,
            type_rules: { pixel: namePixel, smart: namePixel, shape: nameShape }
          })
        });
        const d = await res.json();
        if (d.error) { showErr("run-error", d.error); setRunning(false); return; }
        setResultBanner("running");
        appendLog("🚀 Photoshop 已启动，正在批量处理 PSD…");
        startLogPoller();
      } catch(e) {
        showErr("run-error", "请求失败: " + e.message);
        setRunning(false);
      }
    }

    // ── Stop ─────────────────────────────────────────────────
    async function stopProcess() {
      try {
        await fetch("/api/stop", { method:"POST" });
        appendLog("⛔ 已发送终止指令");
      } catch(e) {}
      setRunning(false);
      setResultBanner("stopped");
    }

    function setRunning(running) {
      document.getElementById("btn-run").disabled  = running;
      document.getElementById("btn-stop").disabled = !running;
      document.getElementById("btn-run").textContent = running ? "⏳ 处理中…" : "🚀 开始处理 PSD";
    }

    // ── Logs ─────────────────────────────────────────────────
    function appendLog(msg) {
      const panel = document.getElementById("log-panel");
      panel.querySelector(".text-gray-500")?.remove();
      const p = document.createElement("p");
      const ts = new Date().toLocaleTimeString("zh-CN",{hour12:false});
      p.textContent = `[${ts}] ${msg}`;
      panel.appendChild(p);
      panel.scrollTop = panel.scrollHeight;
    }
    function clearLogs() {
      document.getElementById("log-panel").innerHTML = '<p class="text-gray-500">— 已清除 —</p>';
    }
    function startLogPoller() {
      if (logPoller) return;
      let last = 0;
      logPoller = setInterval(async () => {
        try {
          const d = await (await fetch("/api/status")).json();
          (d.logs||[]).slice(last).forEach(l => appendLog(l));
          last = (d.logs||[]).length;
          if (!d.running) {
            clearInterval(logPoller); logPoller = null;
            setRunning(false);
            const hasError = (d.logs||[]).some(l => /❌/.test(l));
            setResultBanner(hasError ? "error" : "done");
            appendLog(hasError ? "⚠️ 处理完成（部分文件可能有错误，请查看上方日志）" : "✅ 全部处理完成！");
          }
        } catch(e) {}
      }, 2000);
    }

    function setResultBanner(state) {
      const box   = document.getElementById("run-result");
      const icon  = document.getElementById("run-result-icon");
      const title = document.getElementById("run-result-title");
      const desc  = document.getElementById("run-result-desc");
      box.classList.remove("hidden","bg-green-50","border-green-200","bg-emerald-50","border-emerald-300","bg-red-50","border-red-200","bg-gray-50","border-gray-200");
      box.classList.add("border");
      if (state === "running") {
        box.classList.add("bg-green-50","border-green-200");
        icon.textContent  = "⏳";
        title.textContent = "Photoshop 已启动，正在处理…";
        title.className   = "text-sm font-semibold text-green-800";
        desc.textContent  = "处理完成后状态会自动更新，请勿关闭此页面。";
        desc.className    = "text-xs mt-0.5 text-green-700";
      } else if (state === "done") {
        box.classList.add("bg-emerald-50","border-emerald-300");
        icon.textContent  = "✅";
        title.textContent = "全部处理完成！";
        title.className   = "text-sm font-semibold text-emerald-800";
        desc.textContent  = "PSD 文件已保存至输出文件夹，可在 Photoshop 中查看结果。";
        desc.className    = "text-xs mt-0.5 text-emerald-700";
      } else if (state === "error") {
        box.classList.add("bg-red-50","border-red-200");
        icon.textContent  = "⚠️";
        title.textContent = "处理完成，但部分文件出错";
        title.className   = "text-sm font-semibold text-red-800";
        desc.textContent  = "请查看运行日志中的 ❌ 标记，确认错误原因。";
        desc.className    = "text-xs mt-0.5 text-red-700";
      } else if (state === "stopped") {
        box.classList.add("bg-gray-50","border-gray-200");
        icon.textContent  = "⛔";
        title.textContent = "处理已终止";
        title.className   = "text-sm font-semibold text-gray-700";
        desc.textContent  = "用户手动终止了处理流程。";
        desc.className    = "text-xs mt-0.5 text-gray-500";
      }
      box.classList.remove("hidden");
    }

    // ── Helpers ──────────────────────────────────────────────
    function showErr(id, msg) { const e = document.getElementById(id); e.textContent=msg; e.classList.remove("hidden"); }
    function hideErr(id) { document.getElementById(id).classList.add("hidden"); }

    // ── Init ─────────────────────────────────────────────────
    window.addEventListener("DOMContentLoaded", restore);
  </script>
</body>
</html>
